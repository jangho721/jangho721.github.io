name: Check broken links

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * 1" # weekly, Monday 00:00 UTC
  workflow_dispatch:

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Lychee link check
        uses: lycheeverse/lychee-action@v2
        with:
          # linkedin.com is excluded: it blocks automated requests (incl. lychee/curl)
          # with non-standard status codes even for valid profile URLs.
          args: --no-progress --exclude 'linkedin\.com' index.html
          fail: true
